  const hist=historyFor();
  const last=hist.undo[hist.undo.length-1];
  // PDFиӘӯгҒҝиҫјгҒҝзӣҙеҫҢгҒӘгҒ©гҒ«з©әгҒ®гӮ№гғҠгғғгғ—гӮ·гғ§гғғгғҲгҒҢеұҘжӯҙе…Ҳй ӯгҒёж®ӢгӮӢгҒ“гҒЁгҒҢгҒӮгӮӢгҒҹгӮҒгҖҒ
  // е®ҹйҡӣгҒ«гғҡгғјгӮёгҒҢиЎЁзӨәгҒ•гӮҢгҒҰгҒ„гӮӢзҠ¶ж…ӢгҒёе·®гҒ—жӣҝгҒҲгӮӢгҖӮгҒ“гӮҢгҒ§гҒҫгҒЁгӮҒгҒҰеүҠйҷӨеҫҢгҒ®Cmd/Ctrl+ZгҒ§е…Ёж¶ҲгҒҲгҒ—гҒӘгҒ„гҖӮ
  if(last && isEmptyPageBoardSnapshot(last.snap) && snap.view==='pageBoard' && snap.pages?.length){
    hist.undo[hist.undo.length-1]={snap,key};
    hist.redo=[];
    updateHistoryButtons();
    return;
  }
  if(!last || last.key!==key){
    hist.undo.push({snap,key});
    if(hist.undo.length>60) hist.undo.shift();
    hist.redo=[];
    updateHistoryButtons();
  }
}
async function undoAction(){
  if(state.isBusy) return toast('еҮҰзҗҶдёӯгҒҜж“ҚдҪңеұҘжӯҙгӮ’дҪҝгҒҲгҒҫгҒӣгӮ“гҖӮ');
  if(['pageBoard','splitBoard','jpeg'].includes(state.view) && !state.pdfDoc) return toast('PDFгӮ’иӘӯгҒҝиҫјгӮ“гҒ§гҒӢгӮүж“ҚдҪңгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
  const hist=historyFor();
  if(hist.undo.length<=1) return;

  const currentSnap=captureSnapshot();
  const currentKey=snapshotKey(currentSnap);
  const last=hist.undo[hist.undo.length-1];
  if(currentSnap && (!last || last.key!==currentKey)){
    hist.undo.push({snap:currentSnap,key:currentKey});
  }

  const current=hist.undo.pop();
  hist.redo.push(current);

  // ж—§гғҗгғјгӮёгғ§гғіз”ұжқҘгҒ®гҖҢз©әгғҡгғјгӮёзҠ¶ж…ӢгҖҚгҒҢеұҘжӯҙгҒ«ж··гҒ–гҒЈгҒҰгҒ„гӮӢе ҙеҗҲгҒҜйЈӣгҒ°гҒҷгҖӮ
  // гҒ“гӮҢгҒҢж®ӢгӮӢгҒЁгҖҒиӨҮж•°еүҠйҷӨеҫҢгҒ®Cmd/Ctrl+ZгҒ§гғҡгғјгӮёгҒҢе…ЁйғЁж¶ҲгҒҲгӮӢгҖӮ
  while(hist.undo.length>1 && isEmptyPageBoardSnapshot(hist.undo[hist.undo.length-1].snap)){
    hist.undo.pop();
  }

  await applySnapshot(hist.undo[hist.undo.length-1].snap);
  updateHistoryButtons(); toast('1гҒӨжҲ»гҒ—гҒҫгҒ—гҒҹ');
}
async function redoAction(){
  const hist=historyFor(); if(!hist.redo.length) return;
  const next=hist.redo.pop(); hist.undo.push(next);
  await applySnapshot(next.snap);
  updateHistoryButtons(); toast('1гҒӨйҖІгӮҒгҒҫгҒ—гҒҹ');
}
async function applySnapshot(snap){
  if(!snap) return;
  state.applyingHistory=true;
  try{
    if(snap.view==='pageBoard'){
      state.view='pageBoard';
      const wrap=$('#pageBoardGrid');
      if(!wrap){ renderCurrentView(); return; }
      wrap.innerHTML='';
      const grid=document.createElement('div'); grid.className='thumbGrid'; wrap.appendChild(grid);
      await fillGridWithCards(grid, snap.pages||[], {deletable:true});
      makeSortableGrid(grid,{onChange:()=>{scheduleLivePreview();updateStats();recordHistory();}});
      const now=$('#inNow'); if(now) observeCurrentPage(document.querySelector('.previewWrap'),now);
      scheduleLivePreview(); updateStats();
    }
    if(snap.view==='splitBoard'){
      state.view='splitBoard'; state.splitCount=snap.splitCount||2; state.activeSplitIndex=snap.activeSplitIndex||1; state.splitTransferMode=snap.splitTransferMode||'move';
      await renderSplitBoard();
      for(let i=1;i<=state.splitCount;i++){
        const input=$(`#nameSplit${i}`); if(input && snap.names?.[i-1]) input.value=snap.names[i-1];
        const grid=$(`#splitBox${i}`); if(grid) await fillGridWithCards(grid, snap.boxes?.[i-1]||[], {deletable:true});
      }
      for(let i=1;i<=state.splitCount;i++) addBottomDropPad($(`#splitBox${i}`));
      await hydrateAllVisibleCards(); scheduleLivePreview(); updateStats();
    }
    if(snap.view==='merge'){
      state.view='merge'; state.mergeFiles=(snap.mergeFiles||[]).slice(); renderMerge();
    }
    if(snap.view==='imagePdf'){
      state.view='imagePdf';
      const grid=$('#imageGrid');
      if(!grid){ renderImagePdf(); return; }
      const order=snap.imageIds||[];
      state.imageFiles.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
      await renderImageGrid();
      scheduleImagePdfPreview();
    }
    if(snap.view==='jpeg'){
      state.view='jpeg';
      const wrap=$('#jpegPreview');
      if(!wrap){ renderCurrentView(); return; }
      await buildJpegPageGrid(snap.pages||[]);
      updateStats();
    }
    if(snap.view==='rotatePdf'){
      state.view='rotatePdf';
      const wrap=$('#rotatePreview');
      if(!wrap){ renderCurrentView(); return; }
      await buildRotatePageGrid(snap.pages||[]);
      updateStats();
    }
  }finally{ state.applyingHistory=false; updateHistoryButtons(); }
}

const DRAFT_DB='llldPdfToolDraftV1';
function openDraftDb(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DRAFT_DB,1);
    req.onupgradeneeded=()=>req.result.createObjectStore('drafts');
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function saveDraftQuietly(){
  try{
    if(!state.currentPdfBytes || !state.pdfDoc) return;
    if(state.currentPdfBytes.byteLength && state.currentPdfBytes.byteLength>60*1024*1024) return;
    const snap=captureSnapshot();
    const db=await openDraftDb();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction('drafts','readwrite');
      tx.objectStore('drafts').put({
        at:Date.now(), view:state.view, bytes:Array.from(new Uint8Array(state.currentPdfBytes)),
        currentName:state.currentFile?.name||'дҪңжҘӯдёӯPDF.pdf', sourceNames:(state.sourceFiles||[]).map(f=>f.name), snap
      }, 'latest');
      tx.oncomplete=resolve; tx.onerror=()=>reject(tx.error);
    });
    db.close();
  }catch(e){ console.warn('draft save skipped',e); }
}
async function tryRestoreDraft(){
  if(!('indexedDB' in window)) return;
  try{
    const db=await openDraftDb();
    const draft=await new Promise((resolve,reject)=>{
      const tx=db.transaction('drafts','readonly'); const req=tx.objectStore('drafts').get('latest');
      req.onsuccess=()=>resolve(req.result); req.onerror=()=>reject(req.error);
    });
    db.close();
    if(!draft?.bytes?.length) return;
    const age=Date.now()-draft.at;
    if(age>7*24*60*60*1000) return;
    const ok=confirm(`еүҚеӣһгҒ®дҪңжҘӯгғҮгғјгӮҝгҒҢж®ӢгҒЈгҒҰгҒ„гҒҫгҒҷгҖӮеҫ©е…ғгҒ—гҒҫгҒҷгҒӢпјҹ\n\n${draft.currentName||'дҪңжҘӯдёӯPDF'}\nдҝқеӯҳж—ҘжҷӮпјҡ${new Date(draft.at).toLocaleString()}`);
    if(!ok) return;
    setBusy('еүҚеӣһгҒ®дҪңжҘӯгӮ’еҫ©е…ғдёӯ...', 15);
    state.currentPdfBytes=new Uint8Array(draft.bytes);
    state.currentFile={name:draft.currentName||'еҫ©е…ғPDF.pdf', size:state.currentPdfBytes.byteLength, synthetic:true};
    state.sourceFiles=(draft.sourceNames||[]).map((name,i)=>({name, size:0, lastModified:i, synthetic:true}));
    state.pdfDoc=await pdfjsLib.getDocument({data:state.currentPdfBytes.slice(0)}).promise;
    state.view='pageBoard';
    clearBusy();
    renderCurrentView();
    if(draft.snap && draft.snap.view==='pageBoard') setTimeout(()=>applySnapshot(draft.snap),100);
    toast('еүҚеӣһгҒ®дҪңжҘӯгӮ’еҫ©е…ғгҒ—гҒҫгҒ—гҒҹ');
  }catch(e){ clearBusy(); console.warn('draft restore skipped',e); }
}

async function mergeFilesToBytes(files){
  if(files.length===1) return new Uint8Array(await files[0].arrayBuffer());
  const out=await PDFDocument.create();
  for(let idx=0; idx<files.length; idx++){
    const file=files[idx];
    setBusy(`PDFгӮ’зөҗеҗҲдёӯ... ${idx+1}/${files.length}д»¶`, Math.round(((idx+1)/files.length)*70));
    try{
      const bytes=await file.arrayBuffer();
      const src=await PDFDocument.load(bytes, {ignoreEncryption:false});
      const pages=await out.copyPages(src,src.getPageIndices());
      pages.forEach(p=>out.addPage(p));
    }catch(e){ throw new Error(`${file.name}пјҡ${friendlyError(e)}`); }
    await new Promise(r=>setTimeout(r));
  }
  setBusy('PDFзөҗеҗҲгғҮгғјгӮҝгӮ’дҪңжҲҗдёӯ...', 88);
  return await out.save();
}

async function handleWorkFiles(files){
  const incoming=validatePdfFiles([...files]);
  if(!incoming.length) return;
  try{
    clearOutput();
    setBusy('PDFгӮ’иӘӯгҒҝиҫјгҒҝдёӯ...', 8);
    const hadPdf=!!state.pdfDoc;
    const oldPageCount=state.pdfDoc?.numPages || 0;
    const oldSources=[...(state.sourceFiles||[])];
    const baseFile = hadPdf ? new File([state.currentPdfBytes], state.currentFile?.name || 'зҸҫеңЁгҒ®PDF.pdf', {type:'application/pdf'}) : null;
    const mergeList = hadPdf ? [baseFile, ...incoming] : incoming;
    const displaySources = hadPdf ? ((oldSources.length?oldSources:[baseFile]).concat(incoming)) : incoming;
    state.pendingAppendPages = hadPdf ? Array.from({length:incoming.length ? 0 : 0}) : null;
    state.sourceFiles=displaySources;
    state.currentPdfBytes=await mergeFilesToBytes(mergeList);
    state.currentFile=displaySources.length===1
      ? displaySources[0]
      : { name:`иӨҮж•°PDFзөҗеҗҲ_${displaySources.length}д»¶.pdf`, size:state.currentPdfBytes.byteLength, synthetic:true };
    state.pdfDoc=await pdfjsLib.getDocument({data:state.currentPdfBytes.slice(0)}).promise;
    if(state.pdfDoc.numPages>50) toast(`гғҡгғјгӮёж•°гҒҢеӨҡгҒ„гҒҹгӮҒгҖҒгғ—гғ¬гғ“гғҘгғјиЎЁзӨәгҒ«жҷӮй–“гҒҢгҒӢгҒӢгӮӢе ҙеҗҲгҒҢгҒӮгӮҠгҒҫгҒҷпјҲ${state.pdfDoc.numPages}гғҡгғјгӮёпјүгҖӮ`);
    const newPages = hadPdf ? Array.from({length:state.pdfDoc.numPages-oldPageCount},(_,i)=>oldPageCount+i+1) : null;
    state.pendingAppendPages = newPages && newPages.length ? newPages : null;
    state.autoReflectPdfToSplit = true;
    state.pageCanvases.clear(); state.pageCards=[]; clearPageSelection();
    if(!hadPdf) resetAllHistory();
    toast(hadPdf
      ? `${incoming.length}д»¶гҒ®PDFгӮ’иҝҪеҠ гҒ—гҒҫгҒ—гҒҹ`
      : (displaySources.length===1 ? `${displaySources[0].name} гӮ’иӘӯгҒҝиҫјгҒҝгҒҫгҒ—гҒҹ` : `${displaySources.length}д»¶гҒ®PDFгӮ’зөҗеҗҲгҒ—гҒҰиӘӯгҒҝиҫјгҒҝгҒҫгҒ—гҒҹ`));
    await saveDraftQuietly();
    renderCurrentView();
  }catch(e){ console.error(e); toast('PDFгҒ®иӘӯгҒҝиҫјгҒҝгҒ§гӮЁгғ©гғјпјҡ'+friendlyError(e)); }
  finally{ clearBusy(); }
}

async function renderPageCanvas(pdfDoc, pageNo, maxWidth=260, rotation=0){
  const page=await pdfDoc.getPage(pageNo);
  const baseRotation=normalizeRotation(page.rotate || 0);
  const finalRotation=normalizeRotation(baseRotation + rotation);
  const vp0=page.getViewport({scale:1, rotation:finalRotation});
  const scale=maxWidth/vp0.width;
  const vp=page.getViewport({scale, rotation:finalRotation});
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=Math.floor(vp.width); canvas.height=Math.floor(vp.height);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  return canvas;
}

function updateZoomButtons(){
  const z=state.zoom;
  const prev=$('#zoomPrev'), next=$('#zoomNext'), label=$('#zoomScaleLabel');
  const zoomUndo=$('#zoomUndo'), zoomRedo=$('#zoomRedo');
  const hist=historyFor();
  if(prev) prev.disabled = z.pageNo<=1;
  if(next) next.disabled = z.pageNo>=z.total;
  if(zoomUndo) zoomUndo.disabled = hist.undo.length<=1;
  if(zoomRedo) zoomRedo.disabled = hist.redo.length<=0;
  if(label) label.textContent = Math.round(z.scale*100)+'%';
  const del=$('#zoomDelete');
  if(del){
    const canDelete=!!findEditableCardForZoom();
    del.classList.toggle('hidden', !canDelete);
  }
  renderZoomSplitMoveTargets();

async function renderZoomPage(){
  const overlay=$('#zoomOverlay');
  if(!overlay || overlay.classList.contains('hidden')) return;
  const z=state.zoom;
  const doc=await getZoomDoc(z.source);
  if(!doc) return;
  z.total=doc.numPages;
  z.pageNo=Math.min(Math.max(1,z.pageNo),z.total);
  const area=$('#zoomCanvasArea');
  const title=$('#zoomTitle');
  if(title) title.textContent = `${z.title || (z.source==='output'?'еӨүжҸӣеҫҢPDF':'е…ғPDF')}пјҡ${z.pageNo} / ${z.total}гғҡгғјгӮё`;
  if(area){
    area.innerHTML='<div class="empty">жӢЎеӨ§гғ—гғ¬гғ“гғҘгғјгӮ’дҪңжҲҗдёӯ...</div>';
    const page=await doc.getPage(z.pageNo);
    const editableCard=findEditableCardForZoom();
    const extraRotation = z.source==='input' && editableCard ? cardRotation(editableCard) : 0;
    const baseRotation=normalizeRotation(page.rotate || 0);
    const finalRotation=normalizeRotation(baseRotation + extraRotation);
    const vp0=page.getViewport({scale:1, rotation:finalRotation});
    // v54: жӢЎеӨ§гғ—гғ¬гғ“гғҘгғјеҲқжңҹиЎЁзӨәгҒ§гҒҜгҖҒе№…гҒ гҒ‘гҒ§гҒӘгҒҸй«ҳгҒ•гӮӮиҰӢгҒҰгғҡгғјгӮёе…ЁдҪ“гҒҢз”»йқўеҶ…гҒ«еҸҺгҒҫгӮӢгӮҲгҒҶгҒ«гҒҷгӮӢгҖӮ
    // z.scale гҒҜгҖҢз”»йқўгҒ«еҸҺгҒҫгӮӢгӮөгӮӨгӮәгҖҚгӮ’еҹәжә–гҒ«гҒ—гҒҹжӢЎеӨ§зҺҮгҒЁгҒ—гҒҰжүұгҒҶгҖӮ
    const availableW=Math.max(120, area.clientWidth-54);
    const availableH=Math.max(120, area.clientHeight-54);
    const fitByWidth=availableW / vp0.width;
    const fitByHeight=availableH / vp0.height;
    const fit=Math.max(.15, Math.min(2.5, fitByWidth, fitByHeight));
    const cssScale=fit*z.scale;
    area.style.alignItems = z.scale<=1.01 ? 'center' : 'flex-start';

    // v56: иЎЁзӨәгӮөгӮӨгӮәгҒҜз”»йқўеҶ…гғ•гӮЈгғғгғҲгӮ’з¶ӯжҢҒгҒ—гҒӨгҒӨгҖҒеҶ…йғЁгғ¬гғігғҖгғӘгғігӮ°гҒ гҒ‘й«ҳи§ЈеғҸеәҰеҢ–гҒҷгӮӢгҖӮ
    // ж–Үеӯ—гӮ„зҙ°з·ҡгҒҢжҪ°гӮҢгҒ«гҒҸгҒҸгҒӘгӮӢдёҖж–№гҖҒе·ЁеӨ§PDFгҒ§гҒҜгғЎгғўгғӘгӮ’дҪҝгҒ„гҒҷгҒҺгҒӘгҒ„гӮҲгҒҶдёҠйҷҗгӮ’гҒӢгҒ‘гӮӢгҖӮ
    const cssVp=page.getViewport({scale:cssScale, rotation:finalRotation});
    let pixelRatio=Math.min(2.2, Math.max(1.6, window.devicePixelRatio || 1.6));
    const maxPixels=14000000;
    const estimatedPixels=cssVp.width*cssVp.height*pixelRatio*pixelRatio;
    if(estimatedPixels>maxPixels){
      pixelRatio=Math.max(1.15, Math.sqrt(maxPixels/(cssVp.width*cssVp.height)));
    }
    const renderVp=page.getViewport({scale:cssScale*pixelRatio, rotation:finalRotation});
    const canvas=document.createElement('canvas');
    canvas.width=Math.floor(renderVp.width);
    canvas.height=Math.floor(renderVp.height);
    canvas.style.width=Math.floor(cssVp.width)+'px';
    canvas.style.height=Math.floor(cssVp.height)+'px';
    const ctx=canvas.getContext('2d', {alpha:false});
    await page.render({canvasContext:ctx, viewport:renderVp}).promise;
    area.innerHTML='';
    area.appendChild(canvas);
  }
  updateZoomButtons();
}
async function openPdfZoom(source='input', pageNo=1, title='', cardUid=null){
  const doc=await getZoomDoc(source);
  if(!doc) return toast('жӢЎеӨ§иЎЁзӨәгҒ§гҒҚгӮӢPDFгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ');
  state.zoom={source,pageNo,total:doc.numPages,scale:1.0,title,cardUid};
  const overlay=$('#zoomOverlay');
  overlay?.classList.remove('hidden');
  overlay?.setAttribute('aria-hidden','false');
  await renderZoomPage();
}
function closePdfZoom(){

async function rotateZoomCurrentPage(){

  const card=findEditableCardForZoom();

  rotateCards(targets, 90, {message:true});

function initZoomModal(){
  $('#zoomClose')?.addEventListener('click', closePdfZoom);
  $('#zoomOverlay')?.addEventListener('click', e=>{ if(e.target.id==='zoomOverlay') closePdfZoom(); });
  $('#zoomUndo')?.addEventListener('click', zoomUndoAction);
  $('#zoomRedo')?.addEventListener('click', zoomRedoAction);
  $('#zoomPrev')?.addEventListener('click', async()=>{ state.zoom.pageNo--; state.zoom.cardUid=null; await renderZoomPage(); });
  $('#zoomNext')?.addEventListener('click', async()=>{ state.zoom.pageNo++; state.zoom.cardUid=null; await renderZoomPage(); });
  $('#zoomOut')?.addEventListener('click', async()=>{ state.zoom.scale=Math.max(.5, +(state.zoom.scale-.25).toFixed(2)); await renderZoomPage(); });
  $('#zoomDelete')?.addEventListener('click', deleteZoomCurrentPage);
  $('#zoomRotate')?.addEventListener('click', rotateZoomCurrentPage);
  $('#zoomIn')?.addEventListener('click', async()=>{ state.zoom.scale=Math.min(3, +(state.zoom.scale+.25).toFixed(2)); await renderZoomPage(); });
  window.addEventListener('keydown', async e=>{
    const overlay=$('#zoomOverlay');
    if(!overlay || overlay.classList.contains('hidden')) return;
    const tag=(e.target?.tagName||'').toLowerCase();
    const editing = tag==='input' || tag==='textarea' || tag==='select' || e.target?.isContentEditable;
    const key=(e.key||'').toLowerCase();
    const mod=e.ctrlKey || e.metaKey;

    if(e.key==='Escape'){ closePdfZoom(); return; }

    if(!editing && ((mod && (key==='z' || key==='y')) || (!mod && e.shiftKey && (key==='z' || key==='y')))){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
      if((mod && key==='z' && !e.shiftKey) || (!mod && e.shiftKey && key==='z')){
        await zoomUndoAction();
        return;
      }
      if((mod && key==='y') || (mod && e.shiftKey && key==='z') || (!mod && e.shiftKey && key==='y')){
        await zoomRedoAction();
        return;
      }
    }

    if(!editing && (e.key==='ArrowLeft' || e.key==='ArrowUp') && state.zoom.pageNo>1){
      e.preventDefault();
      state.zoom.pageNo--; state.zoom.cardUid=null; await renderZoomPage();
      return;
    }
    if(!editing && (e.key==='ArrowRight' || e.key==='ArrowDown') && state.zoom.pageNo<state.zoom.total){
      e.preventDefault();
      state.zoom.pageNo++; state.zoom.cardUid=null; await renderZoomPage();
      return;
    }
  });
}

function initGlobalShortcuts(){
  window.addEventListener('keydown', async e=>{
    const tag=(e.target?.tagName||'').toLowerCase();
    const editing = tag==='input' || tag==='textarea' || tag==='select' || e.target?.isContentEditable;
    const zoomOpen = $('#zoomOverlay') && !$('#zoomOverlay').classList.contains('hidden');
    const key=(e.key||'').toLowerCase();

    if(!editing && !zoomOpen && ((mod && (key==='z' || key==='y')) || (!mod && e.shiftKey && (key==='z' || key==='y')))){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
      if(state.isBusy){ toast('еҮҰзҗҶдёӯгҒҜж“ҚдҪңеұҘжӯҙгӮ’дҪҝгҒҲгҒҫгҒӣгӮ“гҖӮе®ҢдәҶеҫҢгҒ«гҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„гҖӮ'); return; }
      if((mod && key==='z' && !e.shiftKey) || (!mod && e.shiftKey && key==='z')){
        await undoAction();
        return;
      }
      if((mod && key==='y') || (mod && e.shiftKey && key==='z') || (!mod && e.shiftKey && key==='y')){
        await redoAction();
        return;
      }
    }

    // Backspace / DeleteпјҡйҒёжҠһдёӯгӮ«гғјгғүгӮ’еүҠйҷӨгҖӮгғ–гғ©гӮҰгӮ¶гҒ®гҖҢжҲ»гӮӢгҖҚиӘӨдҪңеӢ•гӮ’йҳІгҒҗгҖӮ
    if(!editing && !zoomOpen && (key==='backspace' || key==='delete')){
      const cards=selectedCardsInCurrentView();
      if(cards.length){
        e.preventDefault();
        e.stopPropagation();
        if(e.stopImmediatePropagation) e.stopImmediatePropagation();
        deleteSelectedPagesCurrent();
      }
    }
  }, true);
}

function cloneCanvas(src){
  const c=document.createElement('canvas'); c.width=src.width; c.height=src.height;
  c.getContext('2d').drawImage(src,0,0);
  return c;
}

function getPageCardsIn(container){ return [...(container||document).querySelectorAll('.thumbCard.pageItem')]; }
function refreshSelectionClasses(){
  document.querySelectorAll('.thumbCard.pageItem').forEach(card=>card.classList.toggle('selected', state.selectedPageIds.has(card.dataset.uid)));
}
function clearPageSelection(){
  if(state.selectedPageIds) state.selectedPageIds.clear();
  state.lastSelectedUid=null;
  refreshSelectionClasses();
}
function selectOnlyCard(card){
  state.selectedPageIds.clear();
  if(card?.dataset?.uid){ state.selectedPageIds.add(card.dataset.uid); state.lastSelectedUid=card.dataset.uid; }
  refreshSelectionClasses();
}
function handlePageCardClick(ev, card){
  if(ev.target.closest('button,input,.miniBtn')) return;
  const grid=card.closest('.thumbGrid');
  const cards=getPageCardsIn(grid).filter(c=>!c.classList.contains('sortable-ghost'));
  const uid=card.dataset.uid;
  if(ev.shiftKey && state.lastSelectedUid){
    const start=cards.findIndex(c=>c.dataset.uid===state.lastSelectedUid);
    const end=cards.findIndex(c=>c.dataset.uid===uid);
    if(start>=0 && end>=0){
      if(!(ev.metaKey||ev.ctrlKey)) state.selectedPageIds.clear();
      const [a,b]=start<end?[start,end]:[end,start];
      for(let i=a;i<=b;i++) state.selectedPageIds.add(cards[i].dataset.uid);
    }else{
      if(!(ev.metaKey||ev.ctrlKey)) state.selectedPageIds.clear();
      state.selectedPageIds.add(uid);
    }
  }else if(ev.metaKey||ev.ctrlKey){
    if(state.selectedPageIds.has(uid)) state.selectedPageIds.delete(uid); else state.selectedPageIds.add(uid);
    state.lastSelectedUid=uid;
  }else{
    state.selectedPageIds.clear();
    state.selectedPageIds.add(uid);
    state.lastSelectedUid=uid;
  }
  refreshSelectionClasses();
}
function selectedDragCards(from, item){
  if(!item?.dataset?.uid) return [];
  if(!state.selectedPageIds.has(item.dataset.uid)) selectOnlyCard(item);
  const cards=getPageCardsIn(from).filter(c=>state.selectedPageIds.has(c.dataset.uid));
  return cards.length ? cards : [item];
}
async function insertDraggedSelection(evt, opts={}){
  const info=state.dragMulti;
  if(!info || info.done) return;
  info.done=true;
  const to=evt.to;
  const marker=document.createComment('multi-insert');
  to.insertBefore(marker, evt.item);
  const isCopy = !!info.copy;
  let newCards=[];
  if(isCopy){
    evt.item.remove();
    for(const p of info.pages){
      const c=await createPageCard(p,{deletable:true, sourceLabel:state.currentFile?.name||''});
      newCards.push(c);
    }
  }else{
    const frag=[];
    for(const uid of info.ids){
      const el=document.querySelector(`.thumbCard.pageItem[data-uid="${uid}"]`);
      if(el) frag.push(el);
    }
    // SortableгҒ§еҚҳзӢ¬з§»еӢ•гҒ—гҒҹгӮ«гғјгғүгӮӮгҖҒйҒёжҠһгӮ°гғ«гғјгғ—гҒ®е…ғй ҶгҒ«жҲ»гҒ—гҒҰгҒҫгҒЁгӮҒгӮӢ
    newCards=frag.length ? frag : [evt.item];
  }
  const f=document.createDocumentFragment();
  newCards.forEach(c=>f.appendChild(c));
  to.insertBefore(f, marker);
  marker.remove();
  state.selectedPageIds.clear();
  newCards.forEach(c=>state.selectedPageIds.add(c.dataset.uid));
  state.lastSelectedUid=newCards[newCards.length-1]?.dataset.uid || null;
  refreshSelectionClasses();
  await hydrateAllVisibleCards();
}

  }
  const rotate=card.querySelector('.rotateBtn');

    rotate.onclick=async (ev)=>{
      ev.stopPropagation();
      ev.currentTarget.blur();
      const uid=card.dataset.uid;
      const selectedSet=state.selectedPageIds || new Set();
      const targets = uid && selectedSet.has(uid) && selectedSet.size>1 ? selectedCardsInCurrentView() : [card];
      rotateCards(targets, 90, {message:true});
    };
  }
  const del=card.querySelector('.miniBtn');
  if(del){
    del.onclick=(ev)=>{
      ev.stopPropagation();
      ev.currentTarget.blur();
      const uid=card.dataset.uid;

      scheduleLivePreview();
      updateStats();
      recordHistory();
      toast('гғҡгғјгӮёгӮ’еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ');
    };
  }
}
function selectedCardsInCurrentView(){
  let root=null;
  if(state.view==='pageBoard') root=document.querySelector('#pageBoardGrid');
  else if(state.view==='splitBoard') root=document.querySelector('#splitGrid');
  else if(state.view==='jpeg') root=document.querySelector('#jpegPreview');
  else root=document;
  const selected=[...(root||document).querySelectorAll('.thumbCard.pageItem.selected')];
  if(selected.length) return selected;
  // selectedгӮҜгғ©гӮ№гҒҢдҪ•гӮүгҒӢгҒ®зҗҶз”ұгҒ§еӨ–гӮҢгҒҰгҒ„гҒҰгӮӮгҖҒйҒёжҠһзҠ¶ж…ӢSetгҒӢгӮүжӢҫгҒҲгӮӢгӮҲгҒҶгҒ«гҒҷгӮӢ
  return [...(root||document).querySelectorAll('.thumbCard.pageItem')]
    .filter(card=>state.selectedPageIds.has(card.dataset.uid));
}
function deleteSelectedPagesCurrent(){
  const selected=selectedCardsInCurrentView();
  if(!selected.length) return toast('еүҠйҷӨгҒҷгӮӢгғҡгғјгӮёгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
  if(selected.length>=2){
    const ok=confirm(`${selected.length}гғҡгғјгӮёгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ`);
    if(!ok) return;
  }
  ensureHistoryHasCurrentBeforeMutation();
  selected.forEach(card=>card.remove());
  clearPageSelection();
  normalizeGridPads();
  scheduleLivePreview();
  updateStats();
  recordHistory();
  const label = state.view==='jpeg' ? 'JPEGеӨүжҸӣеҜҫиұЎгҒӢгӮү' : '';
  toast(`${selected.length}гғҡгғјгӮёгӮ’${label}еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ`);
}
async function hydrateCardCanvas(card){
  // Sortable.js гҒ® cloneNode гҒ§гҒҜ canvas гҒ®жҸҸз”»еҶ…е®№гҒҢиӨҮиЈҪгҒ•гӮҢгҒӘгҒ„гҒҹгӮҒгҖҒ
  // гӮігғ”гғјз§»еӢ•еҫҢгҒ«е…ғгғҡгғјгӮёгғ»иӨҮиЈҪгғҡгғјгӮёгҒ®гӮөгғ гғҚгӮӨгғ«гӮ’еҝ…гҒҡеҶҚжҸҸз”»гҒҷгӮӢгҖӮ
  if(!card || !state.pdfDoc) return;
  const n=parseInt(card.dataset.page,10);
  if(!Number.isInteger(n) || n<1) return;
  const wrap=card.querySelector('.thumbCanvasWrap');
  if(!wrap) return;
  const rot=cardRotation(card);
  const key=`${n}:${rot}`;
  let canvas=state.pageCanvases.get(key);
  if(!canvas){ canvas=await renderPageCanvas(state.pdfDoc,n,220,rot); state.pageCanvases.set(key,canvas); }
  wrap.innerHTML='';
  wrap.appendChild(cloneCanvas(canvas));
}
let _splitSyncObs=null, _splitSyncTimer=null;
function syncSplitBoxHeights(){
  clearTimeout(_splitSyncTimer);
  _splitSyncTimer=setTimeout(()=>{
    const boxes=[...document.querySelectorAll('#splitGrid .box')];
    if(boxes.length<2) return;
    const box1=boxes[0];

    const refH=box1.getBoundingClientRect().height;
    if(refH>100) for(let i=1;i<boxes.length;i++) boxes[i].style.minHeight=refH+'px';
  },50);

async function createPdfFromPageNums(pageNums){
  const specs=pageSpecList(pageNums);
  if(!specs.length) throw new Error('дҝқеӯҳгҒҷгӮӢгғҡгғјгӮёгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ');
  await ensurePdf();
  const src=await PDFDocument.load(state.currentPdfBytes);
  const out=await PDFDocument.create();
  const copied=await out.copyPages(src, specs.map(x=>x.page-1));
  copied.forEach((p,idx)=>{
    const extra=normalizeRotation(specs[idx].rotation);
    if(extra){
      const base=normalizeRotation(p.getRotation?.().angle || 0);
      p.setRotation(degrees(normalizeRotation(base + extra)));
    }
    out.addPage(p);
  });
  return await out.save();
}

async function restoreSplitUiSnapshot(snap, targetCount){
  if(!snap || !snap.boxes?.length) return false;
  const boxes = Array.from({length:targetCount},(_,i)=>[...(snap.boxes[i]||[])]);
  if(snap.boxes.length > targetCount){
    for(let i=targetCount;i<snap.boxes.length;i++) boxes[targetCount-1].push(...snap.boxes[i]);

async function reflectPdfToSplitBox1({manual=false}={}){
  if(!state.pdfDoc) return toast('PDFгӮ’иӘӯгҒҝиҫјгӮ“гҒ§гҒҸгҒ гҒ•гҒ„гҖӮ');
  let pages=[];
  const assigned=splitAssignedPages();
  if(state.pendingAppendPages?.length){
    pages=state.pendingAppendPages.slice();
  }else{
    pages=Array.from({length:state.pdfDoc.numPages},(_,i)=>i+1).filter(n=>!assigned.includes(n));
  }
  if(!assigned.length && !state.pendingAppendPages?.length){
    pages=Array.from({length:state.pdfDoc.numPages},(_,i)=>i+1);
  }
  const added=await appendPagesToSplitBox1(pages,{dedupe:true});
  state.pendingAppendPages=null; state.autoReflectPdfToSplit=false;
  if(manual) toast(added ? `${added}гғҡгғјгӮёгӮ’гғ•гӮЎгӮӨгғ«1гҒёеҸҚжҳ гҒ—гҒҫгҒ—гҒҹ` : 'жңӘеҸҚжҳ гҒ®гғҡгғјгӮёгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ');
  if(added) recordHistory();
}

  leftPanel.insertAdjacentHTML('beforeend',`<div class="field"><label>зӣ®жЁҷе®№йҮҸпјҲMBпјү</label><input id="targetMb" type="number" min="0.1" step="0.1" placeholder="дҫӢпјҡ10"></div><div class="field"><label>еҲқжңҹеҖҚзҺҮ</label><input id="scaleInput" type="number" min="0.4" max="3" step="0.1" value="1"></div><button class="btn" id="compressBtn">е®№йҮҸиӘҝж•ҙPDFгӮ’дҪңжҲҗ</button><div class="status" id="compressStatus"></div>`);
  rightPanel.innerHTML='<h2>гғ—гғ¬гғ“гғҘгғј</h2><div id="outputPreview"><div class="empty">дҪңжҲҗеҫҢгҒ®PDFгғ—гғ¬гғ“гғҘгғјгҒҢгҒ“гҒ“гҒ«иЎЁзӨәгҒ•гӮҢгҒҫгҒҷгҖӮ</div></div>';
  $('#compressBtn').onclick=async()=>{
    try{
      await ensurePdf();

      const target=parseFloat($('#targetMb').value||'0')*1024*1024;

      if(!Number.isFinite(scale) || scale<=0) scale=1;
      scale=Math.max(.4, Math.min(3, scale));
      let best=null;
      for(let round=0; round<5; round++){
        const status=$('#compressStatus');
        if(status) status.textContent=`дҪңжҲҗдёӯ... з”»иіӘеҖҚзҺҮ ${scale.toFixed(2)}`;

          const jpg=await new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('з”»еғҸеҢ–гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮ')),'image/jpeg',0.82));
          const jpgBytes=new Uint8Array(await jpg.arrayBuffer());
          const img=await out.embedJpg(jpgBytes);
          // е…ғPDFгҒ®з”ЁзҙҷгӮөгӮӨгӮәгӮ’з¶ӯжҢҒгҒ—гҖҒгҒқгҒ®дёӯгҒ«з”»еғҸгӮ’е…Ёйқўй…ҚзҪ®гҒҷгӮӢгҖӮ
          // з”»еғҸгғ”гӮҜгӮ»гғ«гӮөгӮӨгӮәгӮ’гҒқгҒ®гҒҫгҒҫPDFгғҡгғјгӮёгӮөгӮӨгӮәгҒ«гҒҷгӮӢгҒЁгҖҒгғ—гғ¬гғ“гғҘгғјжҷӮгҒ«е·ЁеӨ§гғҡгғјгӮёеҢ–гҒ—гҒҰгӮЁгғ©гғјгҒ«гҒӘгӮӢгҒ“гҒЁгҒҢгҒӮгӮӢгҖӮ
          const [pageW,pageH]=[vp.width/scale, vp.height/scale];
          const p=out.addPage([pageW,pageH]);
          p.drawImage(img,{x:0,y:0,width:pageW,height:pageH});
          canvas.width=1; canvas.height=1;
          if(i%4===0) await new Promise(r=>setTimeout(r));
        }
        best=await out.save();
        if(!target || best.byteLength<=target) break;
        scale=Math.max(.45, scale*.82);
      }
      if(!best) throw new Error('е®№йҮҸиӘҝж•ҙPDFгӮ’дҪңжҲҗгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮ');
      clearOutput();
      state.outputBytes=best;
      const previewBytes = best instanceof Uint8Array ? new Uint8Array(best) : new Uint8Array(best);
      try{
        await renderOutputPreview(previewBytes,'е®№йҮҸиӘҝж•ҙеҫҢPDFгғ—гғ¬гғ“гғҘгғј');
      }catch(previewError){
        console.warn('е®№йҮҸиӘҝж•ҙPDFгҒ®PDF.jsгғ—гғ¬гғ“гғҘгғјгҒ«еӨұж•—гҒ—гҒҹгҒҹгӮҒгҖҒз”»еғҸгғ—гғ¬гғ“гғҘгғјгҒёеҲҮгӮҠжӣҝгҒҲгҒҫгҒҷгҖӮ', previewError);
        await renderCompressedCanvasPreview(scale,'е®№йҮҸиӘҝж•ҙеҫҢPDFгғ—гғ¬гғ“гғҘгғј');
      }
      const st=$('#compressStatus');
      if(st) st.textContent=`е®ҢдәҶпјҡ${fmt(best.byteLength)}`;
      downloadBytes(best,`${safeName(state.currentFile.name)}_е®№йҮҸиӘҝж•ҙ.pdf`);
    }catch(e){ toast(friendlyError(e)); }
    finally{ clearBusy(); }
  };
}async function buildJpegPageGrid(pageNums){
  const wrap=$('#jpegPreview');
  if(!wrap) return;
  await buildCards(wrap, pageNums, {deletable:true, sourceLabel:state.currentFile?.name||''});
  const grid=wrap.querySelector('.thumbGrid');
  if(grid){
    makeSortableGrid(grid,{onChange:()=>{updateStats();recordHistory();}});
  }
  const now=$('#jpegNow');
  if(now){
    const scroll=wrap.closest('.previewWrap') || rightPanel;
    observeCurrentPage(scroll, now);
  }
  updateStats();
}
function renderJpeg(){
  setTitle('PDFвҶ’JPEGеӨүжҸӣ','PDFгҒ®еҗ„гғҡгғјгӮёгӮ’JPEGз”»еғҸгҒЁгҒ—гҒҰеҮәеҠӣгҒ—гҒҫгҒҷгҖӮдёҚиҰҒгҒӘгғҡгғјгӮёгҒҜеүҠйҷӨгҒ—гҒҰгҒӢгӮүZIPдҝқеӯҳгҒ§гҒҚгҒҫгҒҷгҖӮ');
  leftPanel.innerHTML='<h2>ж“ҚдҪң</h2>';
  leftPanel.appendChild(createDropZone('PDFгӮ’гҒ“гҒ“гҒ«гғүгғ©гғғгӮ°&гғүгғӯгғғгғ—','иӨҮж•°PDFгӮ’гҒҫгҒЁгӮҒгҒҰе…ҘгӮҢгӮүгӮҢгҒҫгҒҷгҖӮ'));
  if(state.currentFile){ leftPanel.insertAdjacentHTML('beforeend', currentFileSummary()); appendResetButton(); }
  leftPanel.insertAdjacentHTML('beforeend',`<div class="field"><label>з”»иіӘпјҲеҲқжңҹеҖӨ 1.00пјү</label><input id="jpegQuality" type="number" min="0.3" max="1" step="0.01" value="1.00"></div><div class="field"><label>еҖҚзҺҮ</label><input id="jpegScale" type="number" min="0.5" max="3" step="0.1" value="1"></div><div class="stats" id="statsArea"></div><button class="btn" id="jpegBtn">JPEGгӮ’ZIPдҝқеӯҳ</button><div class="status" id="jpegStatus"></div>`);
  addHistoryControls();
  rightPanel.innerHTML='<div class="previewHeader"><div class="previewHeaderInner"><strong>JPEGеҢ–гҒҷгӮӢгғҡгғјгӮё</strong><span class="pageNow" id="jpegNow">гғҡгғјгӮёжңӘйҒёжҠһ</span></div></div><div class="previewWrap"><div id="jpegPreview"></div></div>';
  if(state.pdfDoc){
    buildJpegPageGrid(Array.from({length:state.pdfDoc.numPages},(_,i)=>i+1)).then(()=>initHistoryPoint());
  }else{
    $('#jpegPreview').innerHTML='<div class="empty">PDFгӮ’гғүгғ©гғғгӮ°пјҶгғүгғӯгғғгғ—гҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>';
  }
  $('#jpegBtn').onclick=async()=>{ try{ await ensurePdf(); const pages=selectedPageSpecsFrom('#jpegPreview'); if(!pages.length) return toast('JPEGеӨүжҸӣгҒҷгӮӢгғҡгғјгӮёгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ'); setBusy('JPEGеӨүжҸӣдёӯ...',5); const q=parseFloat($('#jpegQuality').value||'1.00'), scale=parseFloat($('#jpegScale').value||'1'); const zip=new JSZip(); for(let idx=0;idx<pages.length;idx++){ const spec=pageSpec(pages[idx]); const pageNo=spec.page; $('#jpegStatus').textContent=`${idx+1}/${pages.length}гғҡгғјгӮёгӮ’еӨүжҸӣдёӯ...`; setBusy(`JPEGеӨүжҸӣдёӯ... ${idx+1}/${pages.length}гғҡгғјгӮё`, Math.round(((idx+1)/pages.length)*90)); const page=await state.pdfDoc.getPage(pageNo); const baseRotation=normalizeRotation(page.rotate || 0); const finalRotation=normalizeRotation(baseRotation + spec.rotation); const vp=page.getViewport({scale, rotation:finalRotation}); const canvas=document.createElement('canvas'); canvas.width=Math.floor(vp.width); canvas.height=Math.floor(vp.height); await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise; const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',q)); zip.file(`${safeName(state.currentFile.name)}_${String(idx+1).padStart(3,'0')}_p${String(pageNo).padStart(3,'0')}.jpg`,blob); } const blob=await zip.generateAsync({type:'blob'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`${safeName(state.currentFile.name)}_JPEG.zip`; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); $('#jpegStatus').textContent='е®ҢдәҶгҒ—гҒҫгҒ—гҒҹгҖӮ'; }catch(e){ toast(friendlyError(e)); } finally{ clearBusy(); } };
}

function isImageFile(file){
  return file && (file.type.startsWith('image/') || /\.(jpe?g|png|webp|gif|bmp)$/i.test(file.name));
}
function createImageDropZone(){
  const div=document.createElement('div');
  div.className='drop';
  div.innerHTML='<strong>з”»еғҸгӮ’гҒҫгҒЁгӮҒгҒҰгғүгғ©гғғгӮ°пјҶгғүгғӯгғғгғ—</strong>';
  div.addEventListener('click',()=>$('#imageInput').click());
  ['dragenter','dragover'].forEach(e=>div.addEventListener(e, ev=>{ev.preventDefault(); div.classList.add('dragover');}));
  ['dragleave','drop'].forEach(e=>div.addEventListener(e, ev=>{ev.preventDefault(); div.classList.remove('dragover');}));
  div.addEventListener('drop', ev=>{
    const fs=[...ev.dataTransfer.files].filter(isImageFile);
    if(!fs.length) return toast('з”»еғҸгғ•гӮЎгӮӨгғ«гӮ’е…ҘгӮҢгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
    handleImageFiles(fs);
  });
  return div;
}
function handleImageFiles(files){
  const added=files.map(file=>({id:'img_'+Date.now()+'_'+Math.random().toString(16).slice(2), file}));
  state.imageFiles.push(...added);
  toast(`${added.length}д»¶гҒ®з”»еғҸгӮ’иҝҪеҠ гҒ—гҒҫгҒ—гҒҹ`);
  renderCurrentView();
  setTimeout(recordHistory,50);
}
function imageOrderFromDom(){
  const ids=[...document.querySelectorAll('#imageGrid .imageItem')].map(el=>el.dataset.id);
  const byId=new Map(state.imageFiles.map(x=>[x.id,x]));
  return ids.map(id=>byId.get(id)).filter(Boolean);
}
async function renderImageGrid(){
  const grid=$('#imageGrid'); if(!grid) return;
  grid.innerHTML='';
  if(!state.imageFiles.length){ grid.innerHTML='<div class="empty">з”»еғҸгӮ’гғүгғ©гғғгӮ°пјҶгғүгғӯгғғгғ—гҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>'; return; }
  state.imageFiles.forEach((item,idx)=>{
    const url=URL.createObjectURL(item.file);
    const card=document.createElement('div');
    card.className='thumbCard imageItem pageItem';
    card.dataset.id=item.id;
    card.innerHTML=`<div class="thumbCanvasWrap"><img src="${url}" style="max-width:100%;max-height:210px;display:block" /></div><div class="thumbMeta"><div><div class="pageBadge">${idx+1}жһҡзӣ®</div><div class="sourceBadge">${escapeHtml(item.file.name)}<br>${fmt(item.file.size)}</div></div><button class="miniBtn" title="гҒ“гҒ®з”»еғҸгӮ’еүҠйҷӨ">еүҠйҷӨ</button></div>`;
    card.querySelector('img').onload=()=>URL.revokeObjectURL(url);
    card.querySelector('.miniBtn').onclick=(ev)=>{
      ev.stopPropagation();
      state.imageFiles=state.imageFiles.filter(x=>x.id!==item.id);
      renderImageGrid(); scheduleImagePdfPreview(); recordHistory();
    };
    grid.appendChild(card);
  });
  Sortable.create(grid,{
    draggable:'.imageItem', filter:'.miniBtn', preventOnFilter:false, animation:150, forceFallback:true, fallbackOnBody:true, fallbackTolerance:2,
    ghostClass:'sortable-ghost', chosenClass:'dragging',
    onMove:(evt)=>{ clearDropGuides(); const rel=evt.related; if(rel?.classList?.contains('imageItem')) rel.classList.add(evt.willInsertAfter?'dropAfter':'dropBefore'); return true; },
    onEnd:()=>{
      clearDropGuides();
      const ordered=imageOrderFromDom();
      state.imageFiles=ordered;
      renderImageGrid();
      scheduleImagePdfPreview(); recordHistory();
    }
  });
}
function loadImageAsElement(file){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url); resolve(img); };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error(`${file.name} гӮ’иӘӯгҒҝиҫјгӮҒгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮ`)); };
    img.src=url;
  });
}
async function imageFileToJpegBytes(file, quality=1){
  const img=await loadImageAsElement(file);
  const canvas=document.createElement('canvas');
  canvas.width=img.naturalWidth || img.width; canvas.height=img.naturalHeight || img.height;
  const ctx=canvas.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0);
  const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',quality));
  return {bytes:await blob.arrayBuffer(), width:canvas.width, height:canvas.height};
}
async function createPdfFromImages(items, opts={}){
  if(!items.length) throw new Error('PDFгҒ«гҒҷгӮӢз”»еғҸгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ');
  const mode=opts.pageMode || 'image';
  const margin=Number(opts.margin || 0);
  const quality=Number(opts.quality || 1);
  const out=await PDFDocument.create();
  const A4P=[595.28,841.89], A4L=[841.89,595.28];
  for(let i=0;i<items.length;i++){
    const item=items[i];
    const imgData=await imageFileToJpegBytes(item.file, quality);
    const jpg=await out.embedJpg(imgData.bytes);
    let pageW=jpg.width, pageH=jpg.height;
    if(mode==='a4p'){ [pageW,pageH]=A4P; }
    if(mode==='a4l'){ [pageW,pageH]=A4L; }
    const page=out.addPage([pageW,pageH]);
    const maxW=pageW-margin*2, maxH=pageH-margin*2;
    const scale=Math.min(maxW/jpg.width, maxH/jpg.height);
    const w=jpg.width*scale, h=jpg.height*scale;
    page.drawImage(jpg,{x:(pageW-w)/2,y:(pageH-h)/2,width:w,height:h});
    const st=$('#imagePdfStatus'); if(st) st.textContent=`PDFдҪңжҲҗдёӯ... ${i+1}/${items.length}жһҡ`; setBusy(`з”»еғҸPDFгӮ’дҪңжҲҗдёӯ... ${i+1}/${items.length}жһҡ`, Math.round(((i+1)/items.length)*90));
    if(i%3===0) await new Promise(r=>setTimeout(r));
  }
  return await out.save();
}
function scheduleImagePdfPreview(){ clearTimeout(state.updateTimer); state.updateTimer=setTimeout(updateImagePdfPreview,700); }
async function updateImagePdfPreview(){
  if(state.view!=='imagePdf') return;
  try{
    const items=imageOrderFromDom();
    if(!items.length){ await renderOutputPreview(null,'з”»еғҸPDFгғ—гғ¬гғ“гғҘгғјгҒҢгҒ“гҒ“гҒ«иЎЁзӨәгҒ•гӮҢгҒҫгҒҷгҖӮ'); updateImageStats(); return; }
    const opts={pageMode:$('#imagePageMode')?.value||'image', margin:parseFloat($('#imageMargin')?.value||'0'), quality:parseFloat($('#imageQuality')?.value||'1')};
    const bytes=await createPdfFromImages(items,opts);
    clearOutput(); state.outputBytes=bytes;
    await renderOutputPreview(bytes,'з”»еғҸгҒӢгӮүдҪңжҲҗгҒ—гҒҹPDFгғ—гғ¬гғ“гғҘгғј');
    updateImageStats();
    const st=$('#imagePdfStatus'); if(st) st.textContent=`гғ—гғ¬гғ“гғҘгғјжӣҙж–°е®ҢдәҶпјҡ${fmt(bytes.byteLength)}`;
  }catch(e){ console.error(e); const st=$('#imagePdfStatus'); if(st) st.textContent='гғ—гғ¬гғ“гғҘгғјжӣҙж–°гҒ§гӮЁгғ©гғјпјҡ'+e.message; }
}
function updateImageStats(){
  const s=$('#statsArea'); if(!s) return;
  const total=state.imageFiles.reduce((a,x)=>a+x.file.size,0);
  s.innerHTML=`<div class="stat"><b>з”»еғҸж•°</b><span>${state.imageFiles.length}</span></div><div class="stat"><b>з”»еғҸеҗҲиЁҲ</b><span>${fmt(total)}</span></div><div class="stat"><b>PDFе®№йҮҸ</b><span>${state.outputBytes?fmt(state.outputBytes.byteLength):'-'}</span></div><div class="stat"><b>еҮәеҠӣ</b><span>PDF</span></div>`;
}
async function renderImagePdf(){
  setTitle('з”»еғҸвҶ’PDFеӨүжҸӣ','иӨҮж•°з”»еғҸгӮ’й Ҷз•ӘгҒ«дёҰгҒ№жӣҝгҒҲгҖҒ1гҒӨгҒ®PDFгҒЁгҒ—гҒҰдҝқеӯҳгҒ§гҒҚгҒҫгҒҷгҖӮ');
  leftPanel.innerHTML='<h2>ж“ҚдҪң</h2>';
  leftPanel.appendChild(createImageDropZone());
  leftPanel.insertAdjacentHTML('beforeend',`
    <div class="field"><label>гғҡгғјгӮёгӮөгӮӨгӮә</label><select id="imagePageMode"><option value="image">з”»еғҸгӮөгӮӨгӮәгҒ«еҗҲгӮҸгҒӣгӮӢ</option><option value="a4p">A4зёҰгҒ«й…ҚзҪ®</option><option value="a4l">A4жЁӘгҒ«й…ҚзҪ®</option></select></div>
    <div class="field"><label>дҪҷзҷҪпјҲptпјү</label><input id="imageMargin" type="number" min="0" max="120" step="1" value="0"></div>
    <div class="field"><label>з”»иіӘ</label><input id="imageQuality" type="number" min="0.3" max="1" step="0.01" value="1.00"></div>
    <div class="stats" id="statsArea"></div>
    <div class="stickyActionBlock"><div class="boardActions"><button class="btn" id="downloadImagePdf">PDFдҝқеӯҳ</button><button class="btn ghost" id="clearImages">з”»еғҸгӮ’гӮҜгғӘгӮў</button></div></div>
    <div class="status" id="imagePdfStatus"></div>
`);
  addHistoryControls();
  rightPanel.innerHTML=`<div class="previewHeader"><div class="previewHeaderInner"><strong>з”»еғҸдёҖиҰ§пјҡгғүгғ©гғғгӮ°гҒ§й Ҷз•ӘеӨүжӣҙ</strong><span class="pageNow">${state.imageFiles.length}жһҡ</span></div></div><div class="previewWrap"><div id="imageGrid" class="thumbGrid sortableGrid"></div></div><h2 style="margin-top:18px">PDFгғ—гғ¬гғ“гғҘгғј</h2><div id="outputPreview"><div class="empty">з”»еғҸPDFгғ—гғ¬гғ“гғҘгғјгҒҢгҒ“гҒ“гҒ«иЎЁзӨәгҒ•гӮҢгҒҫгҒҷгҖӮ</div></div>`;
  await renderImageGrid();
  $('#downloadImagePdf').onclick=async()=>{
    try{
      const items=imageOrderFromDom();
      if(!items.length) return toast('PDFгҒ«гҒҷгӮӢз”»еғҸгӮ’иҝҪеҠ гҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
      const opts={pageMode:$('#imagePageMode').value, margin:parseFloat($('#imageMargin').value||'0'), quality:parseFloat($('#imageQuality').value||'1')};
      setBusy('з”»еғҸPDFгӮ’дҪңжҲҗдёӯ...',5);
      const bytes=await createPdfFromImages(items,opts);
      downloadBytes(bytes,'з”»еғҸеӨүжҸӣPDF.pdf');
      state.outputBytes=bytes; updateImageStats(); toast('з”»еғҸPDFгӮ’дҪңжҲҗгҒ—гҒҫгҒ—гҒҹгҖӮ');
    }catch(e){ toast(friendlyError(e)); } finally{ clearBusy(); }
  };
  $('#clearImages').onclick=()=>{ state.imageFiles=[]; clearOutput(); renderImagePdf(); setTimeout(recordHistory,50); };
  ['imagePageMode','imageMargin','imageQuality'].forEach(id=>{ const el=$('#'+id); if(el) el.oninput=scheduleImagePdfPreview; });
  initHistoryPoint(); updateImageStats(); scheduleImagePdfPreview();
}

function renderHelp(){
  state.view='pageBoard';
  renderPageBoard();
}
document.querySelectorAll('.navbtn').forEach(btn=>btn.onclick=()=>{state.view=btn.dataset.view;renderCurrentView();});
setupFileInputs(); renderCurrentView(); setTimeout(tryRestoreDraft,250);
</script>
