<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>コンテンツ詳細 | LLLD Works Hub</title>
  <meta name="description" content="LLLD Works Hubのコンテンツ詳細">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <main class="main detail-page">
    <header class="topbar">
      <div class="topbar-title">
        <strong>LLLD Works Hub</strong>
        <span>コンテンツ詳細</span>
      </div>
      <a class="text-button" href="./index.html">Hubへ戻る</a>
    </header>
    <section class="content-section">
      <div id="contentDetail" class="detail-content">
        <p>読み込み中です。</p>
      </div>
    </section>
  </main>

  <script src="./assets/js/contentService.js"></script>
  <script>
    'use strict';

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug') || '';
    const detail = document.getElementById('contentDetail');

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function renderNotFound() {
      detail.innerHTML = '<h1>コンテンツが見つかりません</h1><p>Hubに戻って、一覧から開き直してください。</p>';
    }

    async function init() {
      if (!slug || !window.ContentService) {
        renderNotFound();
        return;
      }

      try {
        const content = await window.ContentService.getContentBySlug(slug);
        if (!content) {
          renderNotFound();
          return;
        }

        detail.innerHTML = `
          <h1>${escapeHtml(content.title)}</h1>
          <p>${escapeHtml(content.description || content.summary || '')}</p>
          <p>${escapeHtml((content.tags || []).join(' / '))}</p>
          <p><a class="text-button" href="${escapeHtml(content.contentUrl || content.url || './index.html')}">コンテンツを開く</a></p>
        `;
      } catch (error) {
        renderNotFound();
      }
    }

    init();
  </script>
</body>
</html>
