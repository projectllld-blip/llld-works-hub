<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン準備中 | LLLD Works Hub</title>
  <meta name="description" content="LLLD Works Hub / Works Marketの企業アカウント用ログイン画面モック">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-market-page="account" data-account-page="login">
  <main class="market-page account-page">
    <header class="market-header">
      <a class="market-brand" href="./index.html">LLLD Works Hub</a>
      <nav aria-label="アカウント導線">
        <a href="./index.html">社内Hub</a>
        <a href="./marketplace.html">Market β</a>
        <a href="./login.html">ログイン準備中</a>
        <a href="./account.html">アカウント</a>
      </nav>
    </header>

    <section class="market-hero account-hero">
      <div>
        <span class="market-kicker">企業アカウント</span>
        <h1>企業・店舗・教室アカウントのログイン画面です。</h1>
        <p>将来クラウド保存に進むためのUI検証です。今は本番ログイン、実データ保存、同期は行いません。</p>
      </div>
      <div class="account-mode-card">
        <span>現在の認証状態</span>
        <strong data-auth-mode>mock mode</strong>
        <p data-mode-note>現在はログインUIの検証モードです。</p>
      </div>
    </section>

    <section class="detail-lp-grid account-layout">
      <article class="detail-panel">
        <h2>ログイン</h2>
        <p class="account-note">mock modeでは、入力内容やパスワードを保存しません。</p>
        <form class="account-form" id="loginForm">
          <label>
            メールアドレス
            <input id="loginEmail" name="email" type="email" autocomplete="email" required placeholder="example@example.com">
          </label>
          <label>
            パスワード
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required placeholder="検証用。保存されません">
          </label>
          <div class="detail-cta-row">
            <button class="btn primary" type="submit">ログインUIを確認する</button>
            <a class="btn secondary" href="./signup.html">新規登録へ</a>
          </div>
          <a class="account-link" href="./request.html?type=support">パスワード再設定は準備中です</a>
          <p class="account-status" id="accountStatusMessage" aria-live="polite"></p>
        </form>
      </article>

      <article class="detail-panel">
        <h2>入力確認</h2>
        <p class="account-note">本番認証ではありません。Supabase接続前の画面確認用です。</p>
        <dl class="account-preview" id="accountPreview" hidden></dl>
      </article>
    </section>
  </main>

  <script src="./assets/js/siteConfigService.js"></script>
  <script src="./assets/js/authService.js"></script>
  <script src="./assets/js/accountPage.js"></script>
</body>
</html>
