name: QA

on:
  pull_request:
  push:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Whitespace check
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}"...HEAD
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          else
            git diff --check
          fi

      - name: Required GitHub Pages files
        run: |
          set -eu
          for file in index.html portal.html login.html signup.html account.html marketplace.html; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: JSON parse
        run: |
          set -eu
          find . \
            -path './.git' -prune -o \
            -path './node_modules' -prune -o \
            -path './dist' -prune -o \
            -path './build' -prune -o \
            -name '*.json' -type f -print | while IFS= read -r file; do
              node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$file" || {
                echo "JSON parse failed: $file"
                exit 1
              }
            done

      - name: JS syntax
        run: |
          set -eu
          find . \
            -path './.git' -prune -o \
            -path './node_modules' -prune -o \
            -path './dist' -prune -o \
            -path './build' -prune -o \
            -name '*.min.js' -prune -o \
            -name '*.js' -type f -print | while IFS= read -r file; do
              node --check "$file" || {
                echo "JS syntax failed: $file"
                exit 1
              }
            done

      - name: Secret pattern scan
        run: |
          set -eu
          patterns='service_role|sb_secret_|SUPABASE_SERVICE_ROLE|DATABASE_URL|PRIVATE KEY|OPENAI_API_KEY|STRIPE_SECRET|GITHUB_TOKEN|GEMINI_API_KEY|GOOGLE_CLIENT_SECRET'
          files="$(find . \
            -path './.git' -prune -o \
            -path './docs' -prune -o \
            -path './.github' -prune -o \
            -path './node_modules' -prune -o \
            -path './dist' -prune -o \
            -path './build' -prune -o \
            -name 'AGENTS.md' -prune -o \
            -name '*.md' -prune -o \
            -type f \( \
              -name '*.html' -o \
              -name '*.js' -o \
              -name '*.css' -o \
              -name '*.json' -o \
              -name '*.yml' -o \
              -name '*.yaml' -o \
              -name '.env' -o \
              -name '.env.*' -o \
              -name '*config*' \
            \) -print)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" | xargs grep -InE "$patterns" && {
              echo "Potential secret pattern found."
              exit 1
            } || true
          fi

      - name: Main local link targets
        run: |
          set -eu
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const files = ['index.html', 'portal.html', 'login.html', 'signup.html', 'account.html', 'marketplace.html'];
          const missing = [];
          const ignoredProtocols = /^(https?:|mailto:|tel:|javascript:|data:|blob:)/i;

          for (const file of files) {
            const html = fs.readFileSync(file, 'utf8');
            const re = /\b(?:href|src)=["']([^"']+)["']/g;

            for (const match of html.matchAll(re)) {
              const raw = match[1].trim();
              if (!raw || raw === '#' || raw.startsWith('#')) continue;
              if (raw.includes('${') || raw.includes('{{')) continue;
              if (ignoredProtocols.test(raw)) continue;

              const clean = raw.split('#')[0].split('?')[0];
              if (!clean || clean === '.' || clean === '..' || clean.endsWith('/')) continue;

              const target = path.normalize(path.join(path.dirname(file), clean));
              if (!fs.existsSync(target)) missing.push(`${file} -> ${raw}`);
            }
          }

          if (missing.length) {
            console.error(missing.join('\n'));
            process.exit(1);
          }
          NODE
