name: PR Safe Automerge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
      - closed

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  issues: write

jobs:
  classify-and-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Classify PR and configure safe auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info('No pull_request payload. Nothing to do.');
              return;
            }

            const marker = '<!-- llld-pr-safe-automerge -->';
            const labels = {
              safe: 'safe-docs-automerge',
              human: 'human-required',
              blocked: 'auto-merge-blocked',
              setup: 'auto-merge-setup-required'
            };

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            async function addLabels(names) {
              if (!names.length) return;
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: names
              });
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            async function upsertComment(body) {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100
              });
              const existing = comments.find(comment =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                return;
              }
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body
              });
            }

            await Promise.all([
              ensureLabel(labels.safe, '2ea44f', 'Safe docs-only PR eligible for GitHub auto-merge.'),
              ensureLabel(labels.human, 'd73a4a', 'Human confirmation, judgment, or operation is required.'),
              ensureLabel(labels.blocked, 'b60205', 'PR is not eligible for auto-merge.'),
              ensureLabel(labels.setup, 'fbca04', 'GitHub auto-merge setup or branch protection requires human confirmation.')
            ]);

            if (context.payload.action === 'closed') {
              if (pr.merged && pr.head.repo.full_name === pr.base.repo.full_name) {
                const labelNames = (pr.labels || []).map(label => label.name);
                if (labelNames.includes(labels.safe)) {
                  try {
                    await github.rest.git.deleteRef({
                      owner,
                      repo,
                      ref: `heads/${pr.head.ref}`
                    });
                    core.info(`Deleted merged PR branch ${pr.head.ref}.`);
                  } catch (error) {
                    core.warning(`Could not delete branch ${pr.head.ref}: ${error.message}`);
                  }
                }
              }
              return;
            }

            const reasons = [];
            const humanReasons = [];
            const labelNames = (pr.labels || []).map(label => label.name);
            const sameRepo = pr.head.repo?.full_name === pr.base.repo?.full_name;
            const baseMain = pr.base.ref === 'main';

            if (pr.draft) reasons.push('draft PR is not auto-merge eligible.');
            if (!sameRepo) reasons.push('fork PR is not auto-merge eligible.');
            if (!baseMain) reasons.push('base branch is not main.');
            if (labelNames.includes(labels.human) || labelNames.includes('human-required')) {
              reasons.push('human-required label is already present.');
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const filenames = files.map(file => file.filename);
            const allowedDocsOnly = filenames.length > 0 && filenames.every(file =>
              file === 'README.md' || file.startsWith('docs/')
            );

            if (!allowedDocsOnly) {
              reasons.push('changed files are not limited to docs/** or README.md.');
            }

            const dangerousFileMatchers = [
              file => file.startsWith('.github/workflows/'),
              file => file.startsWith('supabase/migrations/'),
              file => file === 'data/site-config.json',
              file => file.startsWith('assets/js/'),
              file => file.endsWith('.html'),
              file => file.startsWith('apps/'),
              file => file.startsWith('contents/'),
              file => file.includes('authService'),
              file => file.includes('supabaseClientService'),
              file => file.includes('siteConfigService'),
              file => file.includes('appInstanceService'),
              file => file.includes('portalStateService'),
              file => file.includes('seatflowCloudService')
            ];

            const dangerousFiles = filenames.filter(file =>
              dangerousFileMatchers.some(matcher => matcher(file))
            );
            if (dangerousFiles.length) {
              reasons.push(`dangerous files changed: ${dangerousFiles.join(', ')}`);
            }

            const blockingAdditionPatterns = [
              {
                name: 'Supabase service role style assignment',
                pattern: /\b(service_role|SUPABASE_SERVICE_ROLE|sb_secret_[A-Za-z0-9_-]*)\b\s*[:=]\s*['"]?[A-Za-z0-9._-]{20,}/i
              },
              {
                name: 'private key block',
                pattern: /-----BEGIN [A-Z ]*PRIVATE KEY-----/i
              },
              {
                name: 'sensitive environment assignment',
                pattern: /\b(DATABASE_URL|OPENAI_API_KEY|STRIPE_SECRET|GITHUB_TOKEN|SUPABASE_SERVICE_ROLE)\b\s*[:=]\s*['"]?\S{12,}/i
              },
              {
                name: 'refresh or access token assignment',
                pattern: /\b(refresh_token|access_token)\b\s*[:=]\s*['"]?[A-Za-z0-9._-]{20,}/i
              },
              {
                name: 'RLS disable SQL',
                pattern: /\balter\s+table\b.+\bdisable\s+row\s+level\s+security\b\s*;?/i
              },
              {
                name: 'RLS disable statement',
                pattern: /^\s*disable\s+row\s+level\s+security\s*;?\s*$/i
              }
            ];

            const docsExplanationTerms = [
              /service_role/i,
              /sb_secret_/i,
              /secret/i,
              /disable row level security/i,
              /\bRLS\b/i,
              /migration/i,
              /Supabase/i,
              /Auth/i,
              /company_accounts/i,
              /app_instances/i,
              /app_data/i
            ];

            const blockingAdditions = [];
            const docsExplanationAdditions = [];
            for (const file of files) {
              const patch = file.patch || '';
              const docsLikeFile = file.filename === 'README.md' || file.filename.startsWith('docs/');
              const additions = patch
                .split('\n')
                .filter(line => line.startsWith('+') && !line.startsWith('+++'))
                .map(line => line.slice(1));
              for (const line of additions) {
                const blockingMatch = blockingAdditionPatterns.find(item => item.pattern.test(line));
                if (blockingMatch) {
                  blockingAdditions.push(`${file.filename} (${blockingMatch.name})`);
                  break;
                }
                if (docsLikeFile && docsExplanationTerms.some(pattern => pattern.test(line))) {
                  docsExplanationAdditions.push(file.filename);
                }
              }
            }

            if (blockingAdditions.length) {
              reasons.push(`blocking risky additions found: ${Array.from(new Set(blockingAdditions)).join(', ')}`);
            }

            const safe = reasons.length === 0;
            let prStatus = safe ? 'ready_to_merge' : 'open';
            let mergeRequired = 'YES';
            let mergeMethod = safe ? 'auto_merge' : 'manual';
            let autoMergeEligible = safe ? 'YES' : 'NO';
            let autoMergeStatus = safe ? 'eligible' : 'blocked';
            let humanRequired = safe ? 'NO' : 'YES';
            let autoMergeMessage = '';

            await removeLabel(labels.safe);
            await removeLabel(labels.blocked);
            await removeLabel(labels.setup);

            if (!safe) {
              await addLabels([labels.human, labels.blocked]);
              humanReasons.push(...reasons);
            } else {
              await removeLabel(labels.human);
              await addLabels([labels.safe]);
              try {
                const mutation = `
                  mutation EnablePullRequestAutoMerge($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: $mergeMethod
                    }) {
                      pullRequest { number autoMergeRequest { enabledAt mergeMethod } }
                    }
                  }
                `;
                await github.graphql(mutation, {
                  pullRequestId: pr.node_id,
                  mergeMethod: 'SQUASH'
                });
                prStatus = 'auto_merge_enabled';
                autoMergeStatus = 'enabled';
                autoMergeMessage = 'GitHub auto-merge was enabled with squash merge.';
              } catch (error) {
                await addLabels([labels.human, labels.setup]);
                mergeMethod = 'manual';
                autoMergeStatus = 'setup_required';
                humanRequired = 'YES';
                autoMergeMessage = `Could not enable GitHub auto-merge: ${error.message}`;
                humanReasons.push('GitHub auto-merge setup, branch protection, or required checks need human confirmation.');
              }
            }

            const resultLines = [
              marker,
              '## PR Safe Automerge 判定',
              '',
              `PR_STATUS: ${prStatus}`,
              `MERGE_REQUIRED: ${mergeRequired}`,
              `MERGE_METHOD: ${mergeMethod}`,
              `AUTO_MERGE_ELIGIBLE: ${autoMergeEligible}`,
              `AUTO_MERGE_STATUS: ${autoMergeStatus}`,
              `HUMAN_REQUIRED: ${humanRequired}`,
              '',
              `changed_files: ${filenames.length}`,
              '',
              '### 判定理由',
              ...(safe ? ['- docs-only PRとして安全条件を満たしました。'] : reasons.map(reason => `- ${reason}`)),
              ...(safe && docsExplanationAdditions.length
                ? ['', '### docs説明語の扱い', `- 禁止語・確認語の説明として扱いました: ${Array.from(new Set(docsExplanationAdditions)).join(', ')}`]
                : []),
              ...(autoMergeMessage ? ['', '### Auto-merge', `- ${autoMergeMessage}`] : []),
              '',
              '### 人間が次にやること',
              ...(humanRequired === 'YES'
                ? humanReasons.map(reason => `- ${reason}`)
                : ['- なし'])
            ];

            await upsertComment(resultLines.join('\n'));
